body:
  text: 畦樂詩集明梁蘭撰歌詞贈别門有車馬客長揖别我歸客行嵗云暮霜雪沾人衣居人送客城南道北風獵獵吹沙草君今一去來何時昨日相逢苦不早君當為我歌我當酌君酒酒酣拔劍起芒光射牛斗寶劍乃神物請君慎藏之土花繡澀毋足惜風雷變化須有時少年行白馬羅衣裳照耀東城隅去年出塞歸西却南單于朝立白玉階暮宿青樓姝文臣何足羡奔走如泥塗逺將歸逺將歸歸來苦不早黃河西沒不復歸鐵衣夜夜眠秋草逺將歸歸來在何時明年二月桃花飛郎時歸來妾下機便裁白紵縫春衣寄劉昭夕陽初下嶺雲長回首西風古道傍鴻鴈不來音信杳教儂何處覔劉郎教儂何處覔劉郎江水灣灣江路長昨夜月明秋似水思君不見斷人腸康節婦令女無子有可依禽獸之行固匪為節婦子幼姑且老比諸夏氏尤艱危况以兵戈滿天地顛沛流離罔不至丈夫志操尚陵夷薄俗紛然不忠義夫人貞節乃獨存豈徒令子仍賢孫我朝若求忠孝士他時必在夫人門送歐陽允堅遼東省兄遼陽去家八千里阿兄荷戈渡遼水北風吹沙海濤起千艘萬艘去如矢阿兄去時衣裳單氈帳夜長衾半寒我欲求兄一相見徂往不愁道路難舍下妻孥自相保春雨山田種須早假令海水平平可樹桑誓不見兄不來鄉贈袁彥通袁郎二十非凡才廣眉清目何竒哉我來山中未相識入門一見心眸開把臂登樓酌我酒六博行觴不停手座間索客歌黃鍾馬上調弓剪青栁君家舊時不可當輿臺出入皆輝光乃知公侯始必復如君志氣非尋常男兒困窮須自保袁郎毋用傷懷抱君不見東漢吳子顔十年返馬漁陽道贈别蕭伯齡子才弱冠胄監趨廣眉秀目髯虬如峨冠褒衣講唐虞金華文獻天下無道宗濂洛咸巨儒先兄哦松埀令譽子以郡博黌宫居球琳碔砆形質殊朝磨夕琢成佩琚人人足可膺時需大明天子龍飛初元正大朝步天衢二親在堂六帙餘十年不見涕零袪退朝歸覲來鄉閭入門羣兒走且呼賔親過從日月虛難弟買羊為子屠綵衣升堂倒酒壺命我賦詩以相娛忠君愛親難兩圖欲留不留心鬱紆兒曹亦以文學拘自京一來看老夫只今西行入蜀都不愁畏途嶮復嶇飄飄自擬文翁俱子今毋用長嗟吁劉氏孝友堂君家兄弟今所無堂顔孝友名非虛七帙夀母堂中居閨門整肅嚴君如家人禮法莫敢疏金昆玉季丹鳯雛綵衣斒斕堂下趨左右更侍朝而脯塤箎迭奏湛且孺孫男孫女前襟裾冢婦稚婦後婉偷慈顔有喜成歡娛叔也鼓笈上京都擅名太學講唐虞前年歸省榮鄉閭天子選才需文儒豸冠白簡立玉除千鍾之祿養有餘不用剖氷求鯉魚四時甘旨登牢蔬人間此樂疇能俱紫荆花發暮春初萱草葉齊雨露濡鸞回錦誥來天衢為君升堂倒雙壺我歌此詩豈茍諛觀風有使行當書送人復往遼東鎮東將軍度遼水健兒悉發良家子旌斾連屯四十營蓁莽芟除五千里城門大開髙枕眠敵人不敢來窺邊白鹽堆雪旋煮海緑麥翻雲新種田去時軍田秪有馬只今牛羊遍原野舊説氷霜苦早寒只今天氣如中夏子從去年遼東來令嚴不敢久徘徊錦袍重重厚裝束樓船嗷嘈天際開臨行莫作刺刺語男兒功名須自取詔書早晚征髙麗手擊蘇文獻聖主挽吳主簿詞侯登庸兮龍飛初皇心􅈤􅈤兮治之圖侯蒞我兮我以舒弱之植兮強之鉏生理遂兮租罔或逋弗遑寧處兮侯云痡枳棘剪兮鸞鳯徂我始聞之涕漣如深山窮民走且呼陽靈匿兮天欲晡魂杳杳兮征修途侯乎侯乎世所無侯之生兮我無茍趨侯之沒兮我非空譽噫吁戲兮云何盱五言古詩南有棫朴林五十韻南有棫朴林縷絡藤蔓纍霜雪嚴寒冬柯葉青紛披於焉營我巢雌雄獲因依拮據冀茍完飄搖幾弗持默默口在箝翛翛尾成隼樊籠不見收罻羅罕蒙施以兹甘索莫罔有逺大期行幽拾沙礫入林休蓬茨勤斯産二雛啾啾恆苦飢為父拙求食哺之不及時為母無所能但知愛其兒宵慮登修蛇晝虞遭餓鴟育恐復育鞠生成荷天私于時東風和春陽亦載遲爪嘴日以利羽毛日以竒宛若鵷鳯雛五采光離褷衆禽歎希有捩眼莫敢窺解飛倐引去勞母呼且追斯須却復旋母子相遨嬉時還學和鳴好音諧塤篪友生嚶來求強聒亦爾為小者六翮舉爰止西山陲西山囿藩都勢極揚瀾湄澗谷深窈窕卉木紛葳蕤徽纆未即加飲啄量所宜大者千仞翔一息瞿塘堆橫雲度東川歷歷經峨嵋谺岩嘯猿猱髙林啼子規西掠太白顛鳥道縈險巇戢翼錦官城無復計安危一鳴無足驚大放瓊琚詞逺近理則殊各言長别離近者或遑覿逺者何由歸丈夫曠世懷恥為兒女悲餘齡病稍侵食減骨力疲母以屬羽毛引領涕交頥雍渠原上搖念兒兩分飛鴻鴈天際來念兒音問稀燕雀思厥初炎涼巧詆嗤儕輩於兒俱側聞先騰馳聖人撫昌運品物咸皥熙願兒食竹實棲彼梧桐枝願兒發赤符跪授白玉墀奚趐阿閣巢差擬虞廷儀兒為王者禎䇿名方自兹操執務端靜語言慎樞機勿事口如簧如簧召咎非顯揚足可云憂患毋以貽雄雌力雖衰下民孰豫欺黽勉埀鴻猷庶用慰遐思述懷寄弟四十韻曩者一分散奔走恐弗全鑿壞既匪愚踰垣諒亦賢豈無內顧憂萬事如棄捐樊籠能茍脫尺素焉可傳思親終夜起憶弟看雲眠嵗月若易邁肝腸徒自煎窮途賴知己感激能相憐天寒製衾裯日暮留杯棬分題刻明燭看劍對長筵醉來幸自遣醒後還復然去秋始得書季冬乃言旋歸途雜雨雪跬步不可前僕夫行且僵衣袂皆已穿依依望故里廢城遙相連空壕下歸鶩墟曲生寒煙入門拜慈母涕淚流潺湲下堂見童稚驚喜走欲顛大兒頗聰敏几案錯簡編小兒亦娟好但覔粥與饘孟光事辛苦何暇施朱鉛溫言慰飢渴訴言纍萬千親戚暨鄰舊來往相摩肩謂我非此行徽纆仍拘攣有妹獨永訣痛哉間黃泉死者良可悲音容日以遷俯視數尺墳新草何芊芊親年迫衰暮復以憂恨牽叔也乃不回云泛吳中船吳中幾千里悠悠越山川遡我别汝來迄今踰三年豈徒空匱數况復憂患纒鶺鴒在原上見此棠棣篇我意俟汝歸卜築西城堧怡愈共甘旨出入相後先夜讀古聖書朝耕髙原田賤貧貴努力窮達信所天汝歸定何時令我心若懸春雨日瀟瀟飛鴻亦翩翩裁詩寄天末悒鬱罄所宣臨書忽哽咽淚下零長箋西畦自適守拙一圃間衡從五畝餘藝麻在髙丘雜以果與蔬春至百草生趂晴聊荷鋤筋力豈不勞蕪穢亦已除家人會知我慰以酒滿壺偶坐斟酌之日落西山隅歸來北忩下我心一事無白雲思親圖為俞千戶賦陟彼崆洞阿載睇孤雲飛雲飛無定蹤思親無已時即戎受王命跬步焉敢離豈不念晨昏道逺莫致之安得生羽翰隨雲去還歸古來盛名士忠孝兩不違矢心委厥躬但恐憂毋貽以謝玄暉鼓吹曲分題賦詩送蕭伯齡赴春官十首江南佳麗地聖皇握赤符渡江定武功東吳據佳麗西楚徵才雄皇皇帝業成赫赫王氣鍾玉帛走羣后車書會大同賔興藹多士獻賦蓬萊宫金陵帝王州大明麗中土南京闕王城允矣天命符實從王迹興明堂當中開四夷日來庭宵衣亟平治臨軒䇿材能眷言竭臣忠千載揚芳聲逶迤帶緑水禁渠通窈窕緑水帶逶迤煙度凝光淨風回生浪遲繡衣絢暖翠朱紱照漣漪菱花開曉鏡楊栁曳春絲共言曲江上倣佛金明池迢遞起朱樓迢遞起華構嵳峩麗晴空碧瓦跂銅爵繡柱盤金龍飛甍紛對起阿閣遙相通珠簾朝捲雨復道春卧虹躡足雲梯上如何步蟾宫飛甍夾馳道朱甍天際起黃道日邊開列侯疊芳榭貴戚聮髙臺鱗次引雲樹翬飛軼煙埃冠蓋屬下視車馬從中來兹言履康衢顧瞻心悠哉埀楊蔭御溝依依御溝栁濯濯承春光弱連金水繞髙蔭禁垣長雕弤剪新線宫衣試淺黃旌旗拂露濕殿閣含風涼瓊林錫宴罷臨流恣翺翔凝笳翼髙蓋樂止清笳吹輦移髙蓋舉飄翩翠雲飛倣佛綵鸞翥繁聲夾仗馳圓影交衢舞曲度凝祥飊塵流浥疏雨吉士屬後車功名良還取疊鼓送華輈鼉鼓遞坎坎鑾和肅雍雍疊奏隨輕吹蓋舉凌層空暫移上林苑復過明光宫興賢下明詔親䇿煩聖衷驂乘會有日君材萬夫雄獻納雲臺表雲臺凌絳霄金爵連蒼闕平明冠蓋馳拂曙鼓鍾發重瞳屢都吁百辟第獻納封事侍臣收綸音中使出君行振竒材敷奏引前列功名良可收奎文耀天闕鶚薦趨皇州弓旌候明發鶯花稱壯遊名山挹鍾阜秀水瞰金流傳臚沐休渥俯陛陳嘉猷志節今如此功名良可收送方知事餽運章貢持麾出蓮幕給餉趨轅門師征抵深谷漕轉遡窮源灘危白石齒山東洪濤奔舟楫苦不前簡書日紛紜既虞軍食乏復恐民力煩王事亦有終黽勉服其勤奚必矢石間而後樹功勳䇿名及振旅足可沾殊恩五峰樓登兹百尺樓睇彼三兩峰低昻各異勢奔逐俱爭雄氣含金碧潤鬱然神秀鍾嵐生遞隱見雲合紛溟濛或擬五嶽尊秩禮何其隆憑髙暢微吟取適援孤桐樂土信為美清興奚由終逍遙亨斯休不翅仙原中恆心詩天地有恆心所以清而寧四時更相代兩曜迭光明化機運無息品彚咸自亨君子存恆心諒由仁義行養親致誠孝事君竭忠貞不以貧賤移不以富貴淫始終守其恆詎云非性成我歌恆心詩為君座右銘挽詩令名夙興慕良覿恨未遑胡為即長瞑生死徒相望雖無交好故而獨增歎傷所傷吾道窮善人日云亡深泉永潛寐封樹經幾霜往行有足稱人情自難忘爰采一束芻路逺不得將送人還鄉成家匪長計去國懷逺憂兹言挈妻孥挂席順東流引睇桑梓間背離三十秋父老欣來歸奔走迎道周自有舊田廬衣食良易謀孟軻昔在齊母沒葬返鄒誓將負白骨卜藏近松楸所願茍遑遂此外亦何求臨岐輒贈言不敢徒淹留賦鴈塔晴雲贈袁叔異崇頂麗層霄飛軒瞰遐曠始登懷頗惕稍覽情初暢澄江一線微武姥雙鬟樣神京鬱迢迢佳氣遙相望矯矯丹鳯雛整翮青雲上鼓篋學已優服命年幾壯髙名從此題臨别母惆悵杏林詩為醫士張宗正賦瞻彼杏樹林婀娜蔭西園活人固不少種者亦何繁東風吐髙花絢若彤霞鮮丹房林下搆藥壺市中懸晨興閲芳景暢情淡忘還素心寡外慕所以常悠然君子樂聞善賦頌纍百篇三世諒所重五株奚足言杏林有榮謝令德無時愆賦龍洲神彩贈别龍洲一何迢逶迤亘長天神物不可攀五采爛且鮮沙回被繁草水積橫孤煙君侯昔逰衍綺羅耀通川清商激金奏屢舞紛瓊筵賓從俱才雄詞賦纍成編佳賞君不見餘韻人猶傳兹晨餞行邁感慨情弗宣中觴起交夀相愛各贈言黽勉企前烈忠義良所先題畫四首杜甫遊春載酒命童子駕言適橋西東風倐而來滿林鶯亂啼選幽果何所無乃黃家蹊羲之好鵝濡毫意未遂拂衣臨清湍茅亭倚髙木六月天風寒白鵝勿復籠暇日時來看淵明歸田輕舟下長浦悠然見衡門故舊極相悅童僕亦載奔知我歸來意相逢但忘言孟浩然灞橋詩思飛雪大如席北風天際來林壑不可辨柴荆殊未開先生一短褐清興何竒哉寄贈袁叔異由監中除湖州西去矯矯丹鳯雛文采光陸離羽翮一何長奮然起髙飛俯視蓬蒿間相去如雲泥思之不可睹令我中腸悲兹言下千仞止彼梧桐枝醴泉可飲渴竹實可療飢徘徊顧其鳯棲息良自宜朝陽麗崇岡和鳴此其時朂哉埀鴻猷庶以慰遐思梅隱為九江府劉通判作衆卉各已摧凌寒梅始繁後凋固匪無先榮誠獨難諒由水雪姿肯隨桃李妍君子慕厥操素心終自堅雖云好爵縻不以塵慮牽但兹保清貞奚翅林泉間贈曽同倫藝忩夜雨餘蓮幕春晝遲窮經本致用讀律乃適宜大藩簡牘繁裁決罔或稽紫薇華始榮鈎簾哦新詩雖匪泉石幽有殊徽纆羇不聞乘田時牛羊蕃且肥掃我林下居暮年以為期題子堅隱居圖徑回林影長山豁川流廣衡扉傍沙掩層軒抗雲敞墜葉下琴牀飛嵐落書幌釋子問字來野人索詩往風生客帆孤日入漁榔響行藥陟西崖采蓮泛南港隱者昔見招興移極兹賞今日覩畫圖令人起遐想祠堂薦新為蕭子所賦兹晨月初吉升堂祠先親裳衣儼上設豆爵紛前陳炮羞薦肥羜棗栗維時新子弟各趨事昭穆咸在倫秩秩慎厥儀洋洋降其神令典古所重永言貽後昆素行詩貴富如浮雲枕肱樂疏食逮從魯大夫軒車駕良駟居夷孰云陋止匡復奚畏行之時其中聖人素乎位所以君子心悠然以居易北忩晨而興東臯夕還憩臨流玩水物涼飈拂輕袂往來無塵雜逍遙有餘地終身恆若斯亦足肆志意自得誠獨難兹言在深味元夕會泮池分韻得可字元夕會泮池兹典或云頗堂上陳籩豆堂下張燈火中座俱時髦賤子側席左既陪弦與歌矧脫韁交鎖學問愧無聞色容焉敢惰錫宴有常節極歡非不可煮雪軒玄景閟靈曜朔風中夜興積雪寒且洌對之煩慮澄薄言溉鬵釜可以燎與烹丹罏含青光朱火赫已升微陽外銷鑠固陰無久凝騰鼎異玄醴崇觴侔大羮中座列嘉薦凛然懷抱清豈無一樽酒酌我友與朋荒宴古所誡潔修今見稱永懷濯其穢庶以諧髙情題徐侯瑞蓮蓮生官池中連根復連蒂兩花正相當雙房更相比此花比君子而非小人媚德音茍弗昭休徴曷由致賢哉邑大夫卓然漢循吏奚翅禾同莖何殊麥岐穗賤子無以稱歌詩紀其異題漁父圖湘水緑於藍數峰青可數髙栁一溪陰投竿擬何許本意匪求魚間情聊自取莞爾歌滄浪揚舲下修渚贈别陳徴士翽彼丹鳯雛嬛嬛隨母飛朝陽麗崇岡爰止梧桐枝六翮日以長五采光陸離髙翔擬千仞凌風顧徘徊竹實諒可食豈不慰子飢但以去母逺啾啾鳴聲悲誓將埀鴻猷䇿名及清時俯視枳棘中相去如雲泥永思堂羇禽戀蓬蒿離人夢鄉閭引睇西北雲中心增鬱紆桑梓日以逺嵗月日以徂顧兹在萬里能不懷歸歟丘壠莽沙草况復春露濡筋力老且衰鬢髮白已疏所幸羇旅間而與骨肉俱投簮茍遑遂回轂良易驅毋用徒自傷加餐保君軀西翠山房層軒抗西岺積翠亘千尺蘭苕春煙霏松檜秋露滴蒼蒼侵緹帷浮浮絢緗帙旭景麗崖紺晴氣帶林碧仰窺白鳥度俯瞰黃猿躑尚書欣重過博士亦屢即縈塗入竹尋危磴捫蘿陟投䇿良少休傾壺聊共適素袍凝黛光錦袂生藍色佳境恣消搖清時幸優逸東山始沽名緑野匪潛迹但兹寡塵紛髙風孰能匹少節生弱齡厲厥志節操矢堅持職分在已盡微軀亦捐之利害奚足言賤貧焉得移青青松柏林嵗寒君始知視彼柏舟篇婦人能闕為大固不可奪小亦不願虧勉旃慎所守克終以為期井有仁人為某太守賦此井不可改下有徴士魂元綱日陵夷孤忠竟誰論幽泉愈清徹精靈乃長存玉甃碧蘚合銀牀秋葉繁侯其謁尼父慷慨聆此言潛德匪君闡教道奚由宣青原僧舍瑶岑抱圓虛珠林陟雲上徑幽秋桂深澗回夏泉響空庭一虎卧落日數僧講黃堂頗遑暇朱幡輒時往洗耳聞梵音觀心息塵想自非政清淨詎能遂佳賞泮池絃誦晨興命良儔駕言翔泮池泛覽君陳篇載歌斯千詩于時日將夕回風生絳帷振衣抱孤桐上堂理朱絲一倡三歎息操雅音更遲充然各有適夷愈良自怡但兹養厥性外誘焉能移别童守益回監中始欣豫告旋抱痾罕能見笑言稍遑遂暌離復云餞門東栁曳絲天際川回練長風揚蒲帆旭日明紈扇學業既已優才華良足羡上舍秋氣涼下帷展黃卷詩思圖沉吟坐終日有酒胡不傾清興罔或窮佳思悠然生所以栗里翁酣暢適其情茍為苦追琢無足令人驚李將軍夀諼堂侯家古名將結髮趨戎行朱衣繡方領錦帶縣銀黃襲兵渡遼海為國開東疆征途五千里母老不及將去年來徴兵回車經舊鄉上堂介眉夀再拜奉一觴别母十年餘蛾眉如秋霜昔時萱草華今兹亦煌煌願無貽母憂幸母壽且康王事有程期不敢久倣徨在家日苦短去家日苦長羣季豈不賢為子心孔傷忠孝願兩盡君親俱難忘樵隱其人能醫卜宅兹山阿取適樵採間筋力豈不勞寵辱奚由干拾藥澗底行振衣林下還一飯施然卧始識豫心安送郭子盧嵗貢春風解輕氷泮芹紆新緑鼓篋下中堂驅車越平陸親交各云餞忠言未遑告兹行升胄監追琢候竒璞積勤學固優致用材更育流滋既溢餘毋以小善録整翮睇層霄奮飛追鴻鵠行路難李陵古竒士報國思捐軀孤軍勢已盡忍辱降胸奴下馬解鐵衣殘卒同嗚嗚拔劍指白日抆血臨長途誓為魯曹沫恥作吳專諸肝腸在漢闕日夜悲穹廬君王不相信老母復何辜惡名豈復免盛德將焉圖子卿若旋歸視我今何如悲哉行路難千古同欷歔幽居懷友幽莊白晝靜居人寡來往髙樹落疏陰深泉生逸響抱忡惜景光微吟答清賞因之懷逺人悵然起遐想留别楊分昭君還既不久我行復有期憶昨君未歸日久徒憂思忽聞車馬來僮僕走相隨入門一會面酌我金屈巵人生最歡樂莫若新相知歡樂苦不長明當與子辭大夫且行役弊車日驅馳吾徒本貧賤奔走何足悲但恐後來時君將復何之孟夏言志孟夏疏雨歇淡然時景清柔條湛初緑髙花吐餘榮徘徊澗中意逍遙林下行幸兹適幽賞遂此逺世情茍為徇維縶焉得全其生夏日端居長夏適佳境默處甘無營炎歊既已逺塵事何由生幽賞玩修竹清齋披黃庭但兹寡紛慮自然神氣清夏夜有懷親故清露湛空宇河漢東南流萬籟各已寂羽蟲鳴未休旅人不自媚對此增離愁抱忡惜徂景索處思良儔所思在鄉國道路非阻修容輝詎能覩夢寐庶可求覩銀河懷人河漢髙且逺迢迢亘長天與君隔秋水河漢遙相連思君覩河明心目恆娟娟河明有時沒我心終不捐秋夜有懷陳渙虛室山氣來衣裳夢回冷月沒河漢髙蛩鳴秋夜永懷君邈容音令人空耿耿感遇風起髙樹顛清響一何悲草木詎有情寒暑移其時君子在逺道旅歸渺無期流光恆若斯我心君焉知候楊生不至逍遙下荆扉臨清曵行屧之子胡不來何人傍沙涉秋日滿髙林幽禽啄黃葉貧婦嘆三世為婚姻兩家各相宜結髮值喪亂零落空自持夫子豈不賢奈何時使之井臼敢辭勞扊扅何可炊匪云親戚誚但為鄰里欺飢寒甘共守貧賤焉能移君看古孟光舉案髙齊眉松坡退隱青松産陽坡蒼蒼挺崇標霜雪豈不繁凌寒恆後凋凝陰翳埀景清響回流飈乘間肆盤桓取適爰逍遙仰視白鶴飛浮雲亦飄飄貴富奚復慕寵辱良自招但兹養餘日詎云非松喬分題得受恩賞送臨江侯平寇還京侯家本名將結髮親戎行解弓調白羽錦綬懸銀黃長驅平楚塞歸來朝未央天子御丹扆侍臣行玉觴飲至䇿勳勞寵命生輝光皇圖億萬年錫爵埀無疆思親圖孝子慕厥親終身無已時自云早失怙鞠育仰母慈古稱軻親賢我母實類之棄背日已逺不復返哺私况今持旌麾迢遙南海湄引領顧舊鄉孤雲隨風飛念兹丘壠間白楊何萋萋旋歸未遑遂能不懷傷悲哀哉孝子心此情天所知先民亦有言事君忠可移黽勉樹竒勳顯揚以為期録闕三字贈蔣吾修遊新安探珠必極海探玉必窮山立志各有在豈憚行路難新安文獻淵稽古之所關秦火不能及有書千萬間家家誦唐虞人人希曾顔孰云先哲門未易梯級攀既趨仁義途慎勿由榛菅歸囊莫輕解為子當諦觀夀萱堂樹萱堂戺間丹葩何葳蕤服之可忘憂孰與憂患違發身事弓劍乘障非邊陲上堂介眉夀綵服爛光輝古稱弗遑將仁者親不遺兹卉有榮謝愛日無少衰九老圖皓首獲謝事選幽聊自怡山水既已佳春陽亦遲遲或囊單父琴偶賭綺黃棊好樂養餘日消搖沐雍熙寵辱固可忘理亂胡不知徒兹齒爵崇恐貽後世嗤壯哉渭川翁持竿兆非彲雲谷雲生幽谷中任情自來去髙舉會飄風旋隂結芳樹寄語谷中人白雲有深趣幽篁古木秋色何娟娟夜來微雨過涼飈颯而至槭槭鳴崇柯美人不可見日暮將如何三槐堂中堂髙迢迢下有三青槐于時夏氣清新柔亦何佳流陰回綺疏分緑凝緹帷好鳥相和鳴涼飈倐而來步庭玩芳景始覺心懷開古人邁種德諒足希鼎台兹植有榮悴令德無少衰題春暉堂中堂髙且深翩翩五采衣昕夕登旨甘慈顔亦愈怡永懷愛日心不為遊子悲兹言二雄藩遂令定省違所欣逮祿養足可榮恩私紫誥回飛鸞閭里生光輝梅竹軒亭亭孤生梅結根踈篁間志操諒不異况兹君子軒幽芳襲庭宇徑節凌雲端俱以霜雪姿特立當嚴寒桃李恃春榮媚人奚足言所希慎自持令德同貞堅一徑亭兹亭一何幽逶迤俯通川上有嘉樹林繁陰翳層軒輕楫時復理孤琴亦嘗援鳥鳴及和春魚遊在深淵物情固不殊人事倐以遷所欣竟陳迹俯仰慨昔年顧豫寡形役與子同周旋題蕭鵬舉在謫所寄弟鵬翔扇緘情托羅扇羅扇非能言月盈尚有虧不如羅扇圓鴻鴈一行飛鶺鴒終在原合歡豈無時分離奚足嘆勿以涼飈至而云相棄捐贈樂生歸神樂觀學仙貴知道豈徒慕長生立身匪忠孝仙道奚由成之子養性靈殆與元化并不效安期輩餌藥身始輕舉手謝世人持節朝帝京飛霞翼丹輿回飈凝玉笙顧無凌風翰飄颻俱遐征胡琴一絃復一絃嘈嘈兩絃間合作千萬聲不勞十指彈凝響入𡨕𡨕繁音促潺潺秦姬曲才度吳兒語未闌四座初願聞聞之俱長嘆題王主簿江山别圖意秪囊一孤桐翩翩下輕舟供帳俱不煩官滿莫可留四山無改色中坻有回流幸哉許重來爾民樂斯丘贈蜀中王鎮撫先皇有天下將軍守閬州去家八千里握節三十秋撫士能深知籌邊遂良謀子孫日以長功名日以收昨聞朝上京復許旋故丘暫合姻戚歡靡遑桑梓留劍閣擬玉門詎非定逺侯題鶺鴒圖和鳴及芳晨急難懷往時其樂本天真相猶寧解為我能安餘日見汝終怡怡偶得鶺鴒圖豫愛其有和翕相得之意因題示兒子潛混俾藏之老夫雖沒齒亦不過此三十字耳珍重珍重贈别姻弟陳仲述陳梁類朱陳姻譜世相聮興替固靡常瓜瓞仍綿綿君年未志學尊翁相棄捐是時喪亂餘兼以飢饉連資業悉破蕩骨肉俱不全有母暨弱弟敗屋八九椽自知讀父書寒飢理殘編閉門甕牖下積勤逾十年聖朝盛文治學校在所先君以科第家備此弟子員先生大驚訝府尹深愛憐道學愈切磋文詞益精研洪武十七載詔書興羣賢君行應鄉貢經義試七篇末場䇿五道剖析如河懸誇多置後列有司殆不偏君謂非取榮兹事吾青氊明當赴春官瀝膽陳陛前親交餞行邁籩豆秩初筵酒酣各贈言珠玉揮青箋上堂拜慈母綵服何翩翩有弟奉甘旨離恨毋足牽君家世顯宦朱紫相摩肩推官曾太父忠厚鄉邑傳謂君必抗宗果若數計然才器既匪凡志操亦甚堅任職無崇卑所貴不愧天思罔墜厥緒夙夜尚慎旃吾妻乃令姊于弟友愛專小兒為君甥庸愚賴陶甄余以竒蹇中務農居園田茍或榮髙足吾子先著鞭相期更逺大能不罄所宣挹爽堂髙堂麗西昊爽氣何蕭森始疑林谷幽稍覺雲煙侵素枝遞虛籟朱絃諧商音匪徒息塵紛足可清煩襟嗤彼路傍子附炎焦寸心題畫偶坐永清晝飛軒絶纎塵亦有南澗翁問字來相親幽意固可適子非林下人贈别莫廣文赴召代陳太守作我來守是邦學校職所先博士誠懇厲諸生亦才賢絃誦固願聞文教賴以宣詎圖戾一鶚遂成兆三鱣嚴車泮池外供帳河梁邊嬿婉良新知暌離徒贈言兹行有民社與子俱慎旃孟夏雨涼宴吳傑齋舍孟夏時景清旅人胡鬱紆絃誦少遑暇壺觴聊與娛况兹吳生舍頗類靜者居髙枕沐輕雨幽蘭被前除朋尊湛芳醑三豆登時蔬襟懷各云暢禮法亦不疏逍遙永朝夕縶我空谷駒題素扇諸君子題扇非瑣瑣於吳蠶越繭則頌述其人僕不取焉抽毫賦此扇之衷情見之於詩團圓復團圓月圓尚有虧致身君懷袖無有盈虧時知君重貞素采色亦不施物微幸相親願言長自持寒暑固代謝用舍適其宜古來婕妤怨此意君諒知春暉堂為陳子檜賦朝亦春暉吟暮亦春暉吟春暉何以報傷哉孝子心自從下堂來不知今幾秋挾䇿上京都即戎入并幽今兹復南征未得歸舊鄉有母不可見涕淚沾襟裳豈無甘旨具曷由一自持豈無斒斕衣曷由一戲嬉人生有如此聞者摧肺肝朂爾貽令名母心當自寬西山爽氣飛軒軼西昊山氣何蕭森始欣日夕佳稍疑煙霧深凝窗影暫度襲袂涼頗侵初陽麗晴景縹眇翳長林憑髙引遐眺足以清煩襟時還理孤桐泠泠諧商音流飈倐而至天碧秋沈沈歸耕柴車夙言駕迢遙越西區大田既多稼雨露亦沾濡荼蓼日以繁課童薅且鉏家人遺以酒兀坐傾一壺不憚筋力勞取樂自有餘歸來北窗下泛覽古聖書但兹安所遇奚必南陽廬題扇境幽寡紛慮堅坐若終身飄飄南山老日夕能相親行當承明趣恐非林下人古松為林道人賦古心不可得古松奚足言秦皇五大夫枝葉無復存枯榮遞相代萬化歸其元道人太古心虛靈何湛然飛行八極表歷劫百億年手中種白榆團團翳青天送江西都司承差弱齡給將命磬折趨轅門軍謀不可測折衝詞令間非有矢石勞亦無文墨煩兹晨餞行邁三爵少盡歡枯桑何蕭蕭嵗暮風色寒出入慎爾儀勿謂貴能官所希歌皇華周爰歷咨宣為琛師題扇悟空心固靜諒由地亦偏髙情恣遐覽山碧雲行天朋儕會所得物性適自然世俗不可溷旨哉聖人言題嚴迪德孝廉扇出入桑梓間笑言樂怡怡親戚亦欣慕朋遊幸相依鄰甕緑可分薄言斟酌之詎圖衰遲景際此盛平時朱太守亷謹堂髙堂一何迢飛甍抗崇岡爰居宣王化艾綬懸銀章廉潔持厥躬堅白如氷霜戒謹存諸心臨下罔或傷夜犬不復聞田閭樂耕桑幸逢堯舜理再覩龔與黃歷階頌此詩以矢永弗忘贈别陳縣丞綸三載哦松間一如下車初政事豈不煩才力自有餘兹晨當棄去軒蓋盈交衢父老谷中至再拜傾酒壺各言恆具瞻莫若賢大夫龍飛撫昌運仁明邁唐虞引領希重來善保千金軀行素軒宣尼靡外慕居易罔不宜牛羊茁以蕃乘田何足卑兩君盛好會揚揚正厥辭九夷亦云居厄陳恆若兹子其景髙矩慎毋僥幸為松柏俟嵗寒桃李榮春姿凡百安所遇聖人良可希彭二令歸香山縣僕往瑞州候小孫得同舟至胥江又分去賦此在邦苦難即出門欣遑俱峨峨大庾關遙遙南海隅同裯卧官舫聮騎遵荒塗笑談晨繼昏討論詩與書殷勤敦古歡顧念生平無嚴程達胥江乖分異前趨君行為民社往往懷憂虞冦盜不可測侵掠奚由蘇賤子緣骨肉恩愛忍弗圖含情旅泊間而亦增煩紆野風吹緼袍蕭蕭霜鬢疏再拜罄一壺能不兩踟蹰衰遲各努力善保金玉軀退庵詩退休息微軀生平歷憂患世事不願聞相知勿復言數椽林下居容膝亦已寬芳草被前除青松蔭簷間放歌暢幽懷遐眺怡我顔朋舊來相過濁醪聊共歡逍遙任餘日心神良自安樗散生松柏挺千仞正直緣天姿霜雪亟摧殘青青蕃且滋自匪澗壑幽願與樗散期譬彼盛德儔恥令虛譽馳匠石一回顧尺度罔不宜卓爾梁棟材大用方自兹屈曲獲長年莊生良可嗤友筠軒屛居寡交好修篁結同心知君慕髙節永言矢斷金匪徒鸞鳯栖時作蛟龍吟泛色凝華觴流響諧素琴揮毫永清晝翛翛回夕隂為君遞涼飈悠悠滌煩襟大夫屢枉駕學士宜幽尋三益誠若斯五君奚足欽贈孟推官此邦實繁庶習俗善訟爭側聞舉錯間片言等神明兹晨促遐裝述職朝上京青松挺崇柯霜氣肅以凝父老填修塗車轂無由行藩臣給軍餉租稅仍煩征賤子伏草野夙夜感且興長驅非所願期以康吾民送别孤凰何翩翩文采光陸離昻首雞鶩儕中心懷傷悲羽翮日以長奮身起髙蜚朝陽麗崇岡青青梧桐枝爰止梧桐枝和鳴亦喈喈竹花已作實可以療子飢萬物有本根失類誠匪宜子為王者瑞天理奚罔知願言垂鴻猷顯揚方自兹藝莊為江西婁僉憲賦幽莊軼浮景端居絶囂紛何以永清晝經史左右陳階下何所有藝草被芳芬以之辟魚蠧而與文翰親眷言顧兹卉每懷康吾民周道良逶迤載馳煩咨詢昭代行化臣孰謂非香藝夏日遊太平福地永夏無與適珠林聊可娛境幽松聲長涼飈生座隅道人繕性熟况以良覿初謂我不可酤清齋掇畦蔬列坐焫妙香泛覽方壺圖亦有采芝翁消搖與之俱悟空弗自縶詎云非吾徒仁安堂髙堂鬱峩峩云是仁者居諒由心德全所以恆晏如堂上何所有左右圖與書堂背何所有諼草被階除道傍種丹杏奚啻百千株承平日遑暇來登俱文儒講道合衆方立言揚令譽乃知安於仁旨哉宣聖謨木庵為趙明府作君子寡外馳質朴良近仁蒞官亦不矯平易民乃親填委日以簡澆浮日以淳援琴清飈度談經涼夜分父老谷中至移時語諄諄具瞻恆若斯孰非太平民楊鎮撫遜志軒將家志氣髙卑遜誠獨難奚知折衝際乃在辭讓間戰陳每先登論功殊厚顔劍橫春星流詩成夕雨闌匪徒賓從娛遂令行伍安古人屛樹下髙風良足攀書隱深居罕塵雜經史紛前陳至道邈難聞先民有遺言賤貧素其行貴富良在天掩帙起長嘆逍遙盼庭前以兹寡外慕形役奚由牽昭代等唐虞宵衣亟徴賢及時䇿芳名詎云甘自捐三益齋切切復偲偲古人良亦難締交匪令人詎云等金蘭屏居塵事稀方池春草繁開徑佇延望殷勤枉髙軒嘉會欣有常講文以為歡嗤彼篤情好悠悠觴詠間眷言罄忠告毋庸相棄捐題畫二首泉鳴一澗長雲去兩崖碧結茅背松坡境偏絶塵迹堅坐閲古書可以永終日皎皎白駒場逍遙幸相即天際煙波浮岩畔漁舟小近晚未收緡夕陽在林杪世事了無聞取適如君少題扇兹樓一何迢虛庭絶塵鞅林髙春木繁澗回夏泉響掩卷起遐思暢吟適清賞亦有抱琴翁乘間共來往霜臺迢迢百尺樓俯瞰雙江流飛軒軼浮景凝霜肅清秋四牡何翩翩弗遑少停留丘民胡靡寧皇衷每懷憂來登匪乘暇爰咨復爰謀慿髙一遐覽心目良悠悠茲臺屹千古令譽埀無休京城别僧迢迢長安街獲與靜者遇纂書靡遑即話禪罕能屢來去本無著擬向名山住一往不願求贈言良所慕明發秋風生浮杯渡南去送僧赴京聖皇纘隆緒一視仁且慈四夷悉來庭萬姓咸雍熙顯幽各異趣𡨕𡨕良可悲梵宫亦嵯峨卿雲爛以埀燦燦金蓮花布地絢生輝西方有神僧真源了能知兹會誠靡常眷言慎自持送羅君仲矩致仕還鄉在京代作弱冠事先帝服勤三十年雲南暨瓊崖足迹履十千先帝升仙去放逐歸園田聖帝旋舊都皎日明中天詔書例徴召小大無棄捐君以去嵗暮入朝覲天顔鬚鬢紛已皤心志強且堅皇衷憫衰邁不以職事牽內官頒書籍禮曹供賞筵敕文諭恩意仍服裳與冠俾歸榮鄉里優遊飬餘間勸民使為善偹載敕諭間我以譾薄才承乏左挍垣送行不敢逺執爵三四傳料君到家時桃李爭春妍有子克嗣宗瑜珥色娟娟豚犬能相親教以孝悌先鄉鄰及姻戚來往相摩肩種秫酒釀醇舉罾鱗獲鮮髙歌酌至夕酌罷醉即眠起來眺門外青山橫素煙儒生索書字釋子坐話禪雙鳬度西上漁笛回東邉萬事無一憂夢寐亦陶然悠哉復悠哉其樂不可言八景查嶺朝煙冥冥天欲曙一抹橫輕素但聞春鳥鳴不見林中樹谷風倐而來縹眇漫空去羅溪夕照餘暉射幽渚夕陽在林杪釣艇未收緡緑蕪下歸鳥消搖溪畔人塵慮由來少斗門小橋空濠春水生數尺橫槎渡牧竪與樵翁昕夕紛來去取履豈無人相如不題柱楓林古廟楓林嵗月深野廟丹青古秋風下紅葉紛飛塞庭户日暮何處翁明燈向神語東港埀釣手持一竹竿艇子悠悠槳輕鷗不飛去且向闕頭傍物色信非儂放歌下東港南源學稼務本莫如耕生計何嘗薄能知稷氏書不鄙樊須學南源禾黍登始信田家樂樵谷勝遊深谷何逶迤伐木丁丁響昔有髙世人谷中遂幽賞或可散煩襟抱琴亦時往雲峰晚眺出門即羣峯引領成遐眺青青天畔松歷歷雲中嶠世事豈徒然清風一長嘯愛日堂兩丸迭相代天運無少休髙堂迫遲莫頺景焉能留逮彼三釡榮供兹八帙秋半晌亦足歡再晨知遑不雞鳴問寢安竟夕寡所憂修竹何青青池魚鮮可求眷言慎爾躬遐算良悠悠送别良時豈不再嘉會亦匪難海隅昔紜紛無因瞻令顔詎圖復相見乃在京邑間峨峨正陽門迢迢西長安春物生光輝嬿婉各盡歡茲晨駕言邁仍以博士遷聖皇重文教非君曷由宣慎保八尺軀盛名當永傳述懷一夕復一夕一朝復一朝貧知嵗月長富恨嵗月銷行者出門去征途日以遙請看昨日花今日顔色凋青春固重來白髮肯見饒老吟漫成章孤斟難盈瓢憂端一自遣園林行以謡但恐在世人人人非松喬五言律詩寄别友人之官古雲中故人趨薄宦萬里去雲中極塞風霜苦單車道路窮烽煙防突騎鄉信候飛鴻此别成蓬梗何年語笑同懷襄兒金兒寄舍弟親愁催鬢改我懷曠歸期夜永勞多夢途窮益自疑豈無豚犬纍空有鶺鴒詩多事煩吾弟天涯獨爾思客舍除夕此夜數杯酒流年一嵗徂客懷空寂寞鄰舍自喧呼寒盡從衣裂更長遇燭孤眼看時序改感激不能無元日飲胡氏堂中君家元日會鄉里羡衣冠前輩風流在諸郎禮數寬焚香傳睡鴨行酒試新盤我亦忘為旅陶然竟夕歡留别春色催行客江頭強别君知深心更苦去逺手難分紅閣燈前雨晴樓席上雲何時重對酒今日又離羣荆湘道中二首江入瀟湘近山連楚塞髙兩崖如積鐵一水不容舠慣客寧辭逺藏身豈憚勞同門多宦逹漂泊愧吾曹澗水橫槎渡山梯鑿石開昔年經喪亂故壘尚崔嵬地逈泉聲響天低晚色催迎人將騕裊稍出白雲來書臺書懷九阜晴初見雙江雨合流泉聲偏近枕獵火自明樓亦有杯中物應無客外愁生涯隨泛梗未擬棹歸舟憶胡謙愛酒陶彭澤忘年漢孔融别來驚早燕歸去羡征鴻道直交遊少心知氣槩同客愁應不盡相憶更無窮春懷三春為客恨兩地惜春光栁短埀新緑花殘貯賸香心連沙鴈遠愁共嶺雲長自然成夢想惟有涕沾裳擬漢宫寂寞甘泉路君王不復來旌旗空縹眇蘭麝已塵埃寶鼎移朱舫金莖卧緑苔柏梁春夜雨惟有野棠開昭君宮庭恩幸少臨别見容姿漢主愁無盡單于喜自知雕鞍催起早玉輦送行遲淚眼持杯酒三軍鼓角悲龍仙寺古傳寺鍾與龍鬭田中鍾不能勝穴地而逃止於青原白鷺之間其穴至今尚存徑三尺許泉水湧出人言其無底焉寺以此得名古寺名空在依山只數椽鍾逃猶有穴龍去已成仙古礎埋春草回塘落澗泉諸僧離亂後頭髮也埀肩秋日憶友漠漠秋雲冷蒼蒼晚色昏故人同契闊今夕異涼溫月黑時驚虎山深早閉門思君終不見愁恨與誰論秋夜有懷碧樹生寒早虛窗貯月深鳴蛩先近枕驚鳥數喧林茵接懷雙璧囊空恥一金不眠清夜永勞想為知心八月十五日夜對月對酒待明月不知時序催影移墻外竹光照手中杯露冷關山逈更深雲漢回明年何處在此地一徘徊别友人侍叔遊金陵步兵非浪出還與仲容偕自是金閨彥尤憐玉樹佳曉晴臨采石夜雨泊秦淮此去期公子都門祖帳排得胡本書并佳作末示諸賢動靜次韻奉酬并呈胡謙闕陳渙書札髙秋至開緘纍十行詩疑陶處士字比漢中郎鴻鴈來何晚鵾鵬意甚長諸賢半零落此去倍堪傷阮籍仍疏放陳琳屬霸才幕中嘗草檄林下數銜杯别已三秋暮書無一字來知君情繾綣能使旅懷開逺書珍在笥虛館重懷君夜枕徒千里秋山秪一雲猿聲揮淚聽梧葉向愁聞惟恨天河水東西兩地分日暮山興喬木孤村晚衡門落照平雲侵歸羽倦風轉繫匏輕洗筆通泉過移牀候月明無人同笑語默坐對諸生逰尊勝寺簡略師四境人煙逈禪宫一徑遙架橋通窈窕飛閣厯岧嶤日暮黃雲合秋髙碧樹凋逺公真靜者塵外數相招贈五將軍傅林蔚柏臺三語掾蓮帳署兵曹飛檄文何壯籌邉計最髙已能親矢石自可建旌旄振旅陪鵷序南宫賜綺袍送羅君仲矩致仕還鄉領簿江都日賢良獨薦君歸休慚白首髙步喜青雲重見心相愛那知手又分草堂江浦上尊酒且論文送指揮致仕代作孫子持旌節歸休八秩餘聞雞催客舞上馬倩人扶行陳毋煩整琴尊足自娛髙堂雙鬢雪不似在穹廬排律挽海桑陳先生鄉邑推名教先生屬典刑道承前烈矩學殖後昆型立志希濓洛研精續考亭源傾趨峽水色焕麗天星寵召辭丹陛休歸掩素扄罷吟司馬賦間授伏生經來者崇師説聞之慕德馨科場三較藝彛鼎纍徴銘鈎賾仍忘倦張皇亦靡停渥殊遭聖代福侑享遐齡會侍春風座常陪暮雪庭徒勤瞻北斗未獲徙南溟晚辱招呼數時欣候問寧直期姻好在詎意考終丁和氣奚由接嘉言豈復聆芝蘭空雨露桃李自郊坰遺帙棲藝閣殘詩寄紙屏居人悲哽咽過客走伶俜行不虧家乘名應托汗青心喪古有制援筆涕交零賦玉笥山贈長史入京靜倚紅蓮幕徐經玉笥山勢盤晴漢表影動碧波間未遂逰觀趣因陪入覲班掠舟驚鶴過棲壁羡雲還歸斾春風裏乘間却試扳贈馮將軍選將征南去將軍受脤行玉音宣聖諭銀節下神京仁者今無敵王師古有征豈徒平小醜意在撫遺氓夜靜藏刁斗風微捲斾旌明光催獻凱天子自知名别劉果三嵗金臺上心知氣槩同才多懷賈誼賦好擬揚雄共立清霄逈連歌夕照空交情初耿耿别意復匆匆沙上雙瓶酒雲間五兩風去人舟漸逺居者恨無窮送某指揮致仕有孫襲爵佩銀黃玉劒雕弓任取將架上素書宜珤愛囊中紫誥慎珍藏極知衰老恩榮盛却喜休間嵗月長耿耿丹心如皎日埀埀白髮似凝霜仍懷邉地常時邏尚問羌人早晚降不擬伏波誇矍鑠但陪甪里足徜徉將車先過金魚館奉几頻留緑野堂鄰叟每來催進飯幕賔相見命持觴竹枝桃葉供行役玉樹芝蘭在坐傍自古年髙能德邵君今積德夀無疆七言律詩訪叔介徴士不遇五日不能一相見拂袂却向林間求使我叩門及比舍聞君著屐經髙丘滿堤落葉晚未掃近砌甘菊時當收公租致期征斂迫殘年懷抱空悠悠賦白鷺晴沙贈别徐尹入京明府行經白鷺洲晴沙如帶水如鈎蒹葭楊栁參差見鸂鶒鴛鴦逺近浮三月溯洄曽駐舄九重催覲又移舟江山有待頻來往早擁雙旌控上遊次韻奉酬素行徴士三日弗面輒遺書何乃契闊已月餘但聞枕琴卧蘭若胡不步屧來林居風流似子固非少交好於我俱無如溪梅作花復即寄聊且致君雙鯉魚遊武山次韻武姥樓閣山之巔數家茆屋依山前棲岩白雲晴冉冉繞林碧篠寒娟娟仙子索詩請題壁樵叟煮茶呼引泉憑高騁懷極幽賞使君佳句令人傳寄劉圭春日已去夏日臨軥輈晝啼苦竹深野棠雨餘新水緑石壁樹杪浮雲隂安知天地有終極不覺嵗月還相侵我思劉郎胡可見徒使遲回勞寸心寄呈東原公劉子彥北闕前年一上書歸來高卧楚郊墟西風短褐雙蓬鬢落日空山一草廬道直不殊梁太傅賦成端擬漢相如别來又是春三月盡日逢人問起居客舍述懷寄呈吳公狐白田郎已出關弊裘季子幾時還古來窮困多竒士今日飄零豈厚顔殘燈細雨家家酒落木浮雲處處山客舍凄涼秋色晚思君兩地鬢毛斑客舍秋雨呈東鄰隱君二首茆屋窮秋晚色寒井梧落盡雨聲殘不堪鴻鴈愁中到誰念衣裳客外單似我生涯今絶少如君高誼古尤難隔籬呼酒銀瓶滿細語燈前共夜闌燈前細雨夜初闌枕上聞雞夢轉難壯節豈因今日改旅懷才向故人寬江天雨色連窗白草樹風聲入室寒景物已殊歸計逺殘年飽飯共相看道中題柱相如舊所聞棄繻今擬漢終軍舟橫古渡春濤壯路出荒城曙色分飛騰未失魚龍會飲啄寧隨雞鶩群堂上慈親空白首倚門望斷楚天雲回仙觀緑樹重重徑滿苔中天樓閣倚崔嵬浮翁跨鶴何年去王子燒丹此地來石洞門開秋夕永松壇香繞晚風回人間自有蓬壺島坐覩昆明幾劫灰寄胡本并陳涣之君家兄弟並才賢文采風流世共傳狎坐笑談人似玉盈觴傾倒酒如泉家徒敗壁懷司馬目極危樓惜仲宣春色可憐今去逺金臺惟有白雲連寄仲述我别陳郎今二年暮雲春樹兩茫然衣冠已喜無人見姓氏何由有客傳能賦相如寧在蜀多才樂毅竟趨燕君親老母俱霜鬢擬向秋風買釣船憶王伯洪客舍凄涼憶故人王郎於我最相親論交有道懷今日分手無言惜去春芳草斜陽江路逺浮萍流水嵗華新也知閭里輕貧賤狐貉由來豈足珍柬彭叔介彭君孝友聞閭里困辱誅求已半生揮筆自憐鵝可换援琴長作鳳來鳴池邉亭館邀人坐郭外桑麻仰子耕祗為家貧親獨老不將文彩謁承明二月十八日大雪二月東風吹雪飄紛紛飛舞綴青條已知過臘元非瑞却喜當春也易消北去絶憐鴻雁冷南來無復虎狼驕農夫水旱占天象還道今年百穀饒酬劉昭贈北樂府二曲皆感慨之辭滿庭微雨夢醒時侵曉將來絶妙詞為客幾回傷仁事懷人千里寄相思銅臺佇望霓裳舞金谷扶歸錦帳移不如與子甘貧賤村酒山歌足自怡寄劉昭并呈彥通劉郎絶似神仙侣聞説無人只倚樓疑是庾公來遣興不殊王粲坐闕微風散帙青山並落日開簾緑樹稠惟有袁闕載酒時還痛飲看吳鈎次湯退菴隱君見寄韻丈人文雅舊知名鄉里衣冠重老成海上青囊傳已久山中白璧種還生臨池洗藥春泉暖入洞看花曉霧晴羽客將來詩滿紙思君轉似隔蓬瀛别劉昭旅館相逢惜又分不勝歸思亦紛紛論交已羡能知己為客何堪更送君古樹殘蟬鳴晚照西風匹馬入秋雲人生最是還鄉好後夜飛鴻何處聞秋日呈友人天末飛雲逐斷鴻人間砧杵動西風孤城寂寞秋江冷萬木蕭森夕照空久客張翰蓴又老多愁宋玉賦難工交遊零落相知少邂逅如君意頗同次歐陽子韶寄示韻先生絶似陶彭澤偶得辭官喜即歸荒圃自鋤傷蔓草衡門長掩竟餘暉髙秋吟咏頻揮翰夏日追逰更解衣兼説近來疏懶甚卧看倦鳥背人飛將歸寄别袁彥通居人置酒餞長途人滿橫樓酒滿壺復喜諸公同笑語遂教久客盡歡娛層崖抹黛湘雲起積水凝寒塞雁呼惟有袁郎相去逺還能分手送行無寄酬胡東氏監務何年捧檄向叢臺共擬𢎞羊善治財官舍已無民事擾鄉書還有故人來春濤拍岸檣烏集暮雨連城旅雁回此地古稱才傑會知君臨眺不勝哀風雨破茆屋茆茨已為風捲之驟雨復作中夜時泥􅀈沾席不堪卧潦水浸牀那得移稚子牽裳喜濯足慈親抱被空愁眉城西大厦人何在滿路蒼苔更可悲去雁無數春鴻向北征相呼相喚恐違程來時流落悲儔侶歸路倉皇顧弟兄曉度戍樓聲漸杳夜移漁浦夢猶驚十年離别關山逺月黑雲寒何處鳴申國公臨江侯濟寧侯金華帳中夜宴次韻三首征南自是一長城內府分符總禁兵事業不殊周召虎才華仍擬漢匡衡瓊筵看劍春星動玉帳談經夜雨鳴聞説蒲桃天上至紫駝銀甕緑波生虎頭燕頷美風姿早嵗登壇聖主知出塞昔曽持使節征蠻今見領王師雙飛盤鳳封侯誥五色交龍命將旗黃屋已聞清楚塞采嶶又擬勞旋歸漢代功名屬聞孫早將竒計報君恩旌旗有影雲中去刁斗無聲月下屯萬里橫行車作陳三軍晏起戟為門春風雙佩朝丹闕宴賜銀罌下紫垣除夕喜兒曺皆逺歸兒曹逺近俱儒仕一在筠州一閬州兩地行程非可約片時歸計似同謀且從除夕嘗家醖莫問新年買客舟代際唐虞各努力老夫白首自無憂南軒飬親為劉孟昭賦小車迎飬爭愈惋秪愛南軒每每過諼草葉齊春雨足紫荆花發午風和教兒裹藥身猶健呼婢煎茶客尚多兼説諸孫數十輩問安膝下日肩摩二月三日劉侍御子敏巡廣西便道歸省能言在蜀小兒為所知者薦之朝吏部已遣使召之賦此寄示繡衣持斧日邉來語我天官召汝回好竭臣忠思報本重煩聖慮自掄才書緘先寄彭城便舟下休忘灔澦危長念初離偏去逺從今咫尺是蓬萊柬胡商用十日不見商山翁橋南橋北俱罕逢碧梧翠竹春江外黃卷青燈夜雨中泮水曽蒙往教力國史亦賴搜求功我始相聞幸相即杖藜毋惜時過從次宋伯循見示秋收後作韻二首此老居山豈為耕外人剛道一㕓氓延年合藥仙方古永日橫經易學明放犢徑中苔任滿種魚池底水教平喜聞早遂農家願南畝東阡頗有成養得黃雞啄黍秋釀成白酒釅如油稻畦穫了須回棹詩卷評來只倚樓會見晨星初落落何妨暮景盡休休瓦盆已老兒孫長爾汝偷間取次謀次啓晦姪早朝韻腐儒安得識天顔咫尺丹門曙色寒貔虎摩肩趨甲仗要荒搏顙奉衣冠詔頒書籍勤中使樂侑珍羞進大官似汝才華知不忝早陪鶴駕侍金鑾贈地師彭仲武坤勢奔騰萬象殊隂陽理合氣相符昔聞白水興王業今見金陵屬帝都羡子已歸華表鶴人生咸願首丘狐彭郎自是籛鏗裔肘後青囊世所無病中得長兒潛書至自北京喜而賦此因便書示潛凡二首瀟然卧病室南隅賴有諸孫問起居原自閭閻蹤迹少轉於朋舊笑談踈餘年止飲瓢應棄近日粗安藥未除底事老懷能慰藉叩門人送北京書書來萬里報平安抱病胸懷取次寬首報逺方俱入貢中期老父倍加餐新分馬乳偏能飲舊賜貂裘不怕寒兼説冷官多述作賦成早晚寄來看五言絶句窗下月落窗中暗月來窗外明夜深風弄葉疑是有人行題畫四首吹笛草緑春風轉花濃夕照曛翠華門外度鳳吹杳難聞題扇鈿合收殘黛香風吹緑衣間來消永晝非是效班姬題葉秋早繡裳寒霜清宫樹丹不教寄流水題與小娃看琵琶金屋漸黃昏香凝錦幄溫未曾辭漢苑哀怨與誰論題紅梅貞態由來白輕紅故惱人莫將桃李比别是一枝春題冷載陽小景四首朝回典却衣酒債仍常有何處寫幽懷村村是花栁天下已歸周一竿果何釣挾䇿向君門莫待飛熊兆宫商初不解敢謂無知音欲得林中趣泠泠絃上心獨往意甚佳興闌良可惜胡不造衡門寒爐一相即七言絶句迎祥觀石徑雲深長緑苔仙家樓臺絶纎埃空庭盡日無人到山鳥窺簷時下來題雪竹紅梅兔園酣宴侍梁王翡翠簾埀錦幄張銀燭燒殘天不曙佳人隊隊舞霓裳題畫圖樓臺深倚白雲隈一澗縈回出洞來自古神仙求不得劉郎有路到天台題沈令尹小景笑殺陶潛歸去休潯陽江上棹扁舟如今令尹新承寵卓魯功名到白頭題扇湖水湖山六月清畫船曽向越中行采蓮一曲歌聲散醉看流雲席上生題章琳扇嫦娥飛來丹桂香乘鸞舞女素羅裳廣寒漸逺天似水風露滿身宫漏長題畫竹秖見鳯毛髙數尺豈知龍尾合千尋有時客報平安字緑泛深杯風滿林題竹為一槎作時初生子此君老節已蒼蒼猶解飄翩引鳳凰若箇龍孫能似玉他年會見拂雲長題鷹長楊材官臂來時駕前決雲呼健兒草間狐兔不日盡勇鋭如此傾城知題郭思彥畫號間樂北郭先生樂自間坐聞天籟晝珊珊興來也解傾佳釀名擬風流兩晉間杏林圖夫子教人種杏花于今繞屋是丹砂過橋野叟如相問不比尋常賣酒家題楊思貽竹風雨瀟瀟秖一枝此君髙節苦難持于今鳳尾凌霄漢會見龍孫滿眼時題吳傑扇輪輪囷囷一片雲非煙非霧白紛紛山人不敢自怡悅千里殷勤持贈君畦樂詩集
