body:
  text: 畦樂詩集别集類五明提要臣等謹案畦樂詩集一卷明梁蘭撰蘭字庭秀又字不移泰和人右贊善梁潛之父也隱居不仕故以畦樂自號於楊士竒為姻家士竒嘗從之學詩此集即士竒所編前有洪武三十一年士竒序考士竒所作蘭墓志稱卒於永樂八年則編此集時蘭猶及見之也舊夲列泊菴集後蓋用山谷集後附刻伐檀集之例今以各自為集仍分著于録原目列古今體詩二百三十四首而五言古詩中注闕七首實二百二十七首題中有缺字二處詩中有缺字二處均無别夲可補今亦仍之士竒序稱其志平而氣和識逺而思巧渢渢焉穆穆焉簡寂者不失為舒徐踈宕者必歸於雅則優柔而確譏切而婉雖自重其師推重不無少溢而於元季繁音曼調之中獨翛然存陶韋之致固亦不愧於作者矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀畦樂詩集原序詩以道性情詩之所以傳也古今以詩名者多矣然三百篇後得風人之㫖者獨推陶靖節由其冲和雅淡得性情之正若無意于詩而千古能詩者卒莫過焉故能輕萬鍾芥千駟翛然物表俯仰無慚豈非足乎已而無待于外者乎是雖不必以詩名而誦其詩者慨然想見其為人吾邑畦樂梁先生生元季蚤失怙下董帷設絳帳資束修承歡母氏後以二子績學制行膺政教之任長歷官翰林春坊次任溧陽學博俱卓有聲望素佩先生之庭訓者也先生嗜恬淡屢徴不赴就養官舍日與名公卿稱觴賦詩相樂也已而嘆曰吾二兒頗稱任使可上報朝廷矣盍求吾之所自樂乎仍歸休栁溪濠梁之間有畦數畝可耕可桑可漁可釀可濯可蔭獨闢一軒日督諸孫問學其中人非縫掖士不日來至有慕先生彛範數來請益者先生弗類倦勤誘以德義方正於聖賢之道靡弗貫下至諸子百氏皆約通大要為文章尤樂于詩歌天氣爽朗時臨清坐茂望玉華武姥諸峯謳吟翛翛然以為常蓋先生于詩自三百篇以還若蘇李枚乘若建安若六朝以及盛唐諸名家無不涵泳融液如已素有而又志平而氣和識逺而思巧故見諸篇章渢渢焉穆穆焉簡寂者不失為舒徐疏宕者必歸于雅則優柔而確譏切而婉先生之于詩可謂至矣然緣趣而作既罷即棄去間存其藁遇有愛重之者聽持去不靳故雖詩名聞一時人咸以不得全見為憾士竒自幼聆先生之教間記所嘗誦記若干篇為一卷嗚呼世之不考于古者衆矣先生敦用乎古者雖不獨其詩而所以名諸人人者亦不待詩顧自有可名者而使聞先生之名因詩而求之以知其性情之正則是篇烏可少哉烏可少哉是以僣冒叙之洪武三十一年冬十月既望姻家生楊士竒叙
